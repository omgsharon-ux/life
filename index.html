<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Georgia, "Times New Roman", serif;
            background-color: #FDF5F5;
            color: #4A2F35;
            min-height: 100vh;
        }

        /* ── HEADER ── */
        header {
            background: linear-gradient(135deg, #E8B4B8 0%, #C9847A 50%, #9E5D67 100%);
            padding: 32px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 16px rgba(158,93,103,0.25);
        }

        header h1 {
            font-size: 42px;
            font-weight: normal;
            letter-spacing: 0.1em;
            color: #fff;
            text-shadow: 0 2px 8px rgba(74,47,53,0.3);
        }

        header .date {
            color: rgba(255,255,255,0.85);
            font-size: 16px;
            letter-spacing: 0.05em;
        }

        /* ── MAIN LAYOUT ── */
        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px 28px 60px;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 28px;
            align-items: start;
        }

        /* ── CARD ── */
        .card {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 2px 16px rgba(201,132,122,0.12);
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, #E8B4B8 0%, #C9847A 100%);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-header h2 {
            color: #fff;
            font-size: 18px;
            font-weight: normal;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            flex: 1;
        }

        .card-body { padding: 20px; }

        /* ── BUTTONS ── */
        .btn-rose {
            background: linear-gradient(135deg, #C9847A, #9E5D67);
            color: #fff;
            border: none;
            border-radius: 30px;
            padding: 8px 18px;
            font-size: 18px;
            cursor: pointer;
            line-height: 1;
            font-family: Georgia, serif;
        }
        .btn-rose:hover { background: linear-gradient(135deg, #9E5D67, #7D4E57); }

        .btn-ghost {
            background: rgba(255,255,255,0.25);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 12px;
            cursor: pointer;
            font-family: Georgia, serif;
            white-space: nowrap;
            text-decoration: none;
            display: inline-block;
        }
        .btn-ghost:hover { background: rgba(255,255,255,0.4); }

        .btn-nav {
            background: none;
            border: 2px solid #E8B4B8;
            color: #C9847A;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-nav:hover { background: #F4E0E0; }

        .btn-delete {
            background: none;
            border: none;
            color: #E8B4B8;
            font-size: 18px;
            cursor: pointer;
            padding: 0 2px;
            flex-shrink: 0;
            line-height: 1;
        }
        .btn-delete:hover { color: #9E5D67; }

        /* ── TO DO ── */
        .todo-input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
        }

        .todo-input-row input {
            flex: 1;
            padding: 9px 14px;
            border: 2px solid #E8B4B8;
            border-radius: 30px;
            font-size: 14px;
            font-family: Georgia, serif;
            color: #4A2F35;
            background: #FDF5F5;
            outline: none;
        }
        .todo-input-row input:focus { border-color: #C9847A; }

        #todo-list { list-style: none; }

        #todo-list li {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid #F4E0E0;
        }
        #todo-list li:last-child { border-bottom: none; }

        #todo-list input[type="checkbox"] {
            accent-color: #C9847A;
            width: 17px;
            height: 17px;
            margin-top: 2px;
            flex-shrink: 0;
            cursor: pointer;
        }

        #todo-list label {
            flex: 1;
            font-size: 14px;
            line-height: 1.5;
            cursor: pointer;
        }
        #todo-list li.done label { text-decoration: line-through; color: #C9A9A9; }

        .empty-msg {
            color: #C9A9A9;
            font-size: 13px;
            text-align: center;
            padding: 14px 0;
        }

        /* ── WEEK NAV ── */
        .week-nav {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            border-bottom: 1px solid #F0D5D5;
            background: #FDF5F5;
        }

        .week-nav span {
            flex: 1;
            text-align: center;
            font-size: 14px;
            color: #9E5D67;
            font-weight: bold;
            letter-spacing: 0.03em;
        }

        /* ── MEAL GRID ── */
        .meal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            padding: 16px 20px 20px;
        }

        .meal-day { display: flex; flex-direction: column; gap: 6px; }

        .meal-day-header {
            text-align: center;
            padding-bottom: 6px;
            border-bottom: 2px solid #E8B4B8;
        }

        .meal-day-name {
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #9E5D67;
        }

        .meal-day-date { font-size: 10px; color: #C9A9A9; margin-top: 1px; }

        .meal-day.today .meal-day-name { color: #7D4E57; }
        .meal-day.today .meal-day-header { border-bottom-color: #9E5D67; }

        .meal-slot {
            background: #FDF5F5;
            border: 1px solid #F0D5D5;
            border-radius: 8px;
            padding: 5px 6px;
            min-height: 58px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .meal-slot-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #C9847A;
            font-weight: bold;
        }

        .meal-slot-content { flex: 1; display: flex; align-items: flex-start; }

        .meal-recipe-name {
            font-size: 11px;
            color: #4A2F35;
            line-height: 1.3;
            text-decoration: none;
            display: block;
            flex: 1;
        }
        .meal-recipe-name:hover { color: #9E5D67; text-decoration: underline; }

        .meal-slot-add {
            font-size: 11px;
            color: #D4AFAF;
            cursor: pointer;
            background: none;
            border: none;
            font-family: Georgia, serif;
            padding: 0;
            text-align: left;
        }
        .meal-slot-add:hover { color: #C9847A; }

        .meal-slot-clear {
            font-size: 9px;
            color: #E8B4B8;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            align-self: flex-end;
        }
        .meal-slot-clear:hover { color: #9E5D67; }

        .warn-badge {
            font-size: 9px;
            background: #FFF0D0;
            color: #B87A00;
            border-radius: 4px;
            padding: 1px 4px;
            margin-top: 2px;
            display: inline-block;
        }

        /* ── SAVE STATUS ── */
        .save-status {
            font-size: 11px;
            color: rgba(255,255,255,0.8);
            transition: opacity 0.5s;
        }
        .save-status.hidden { opacity: 0; }

        /* ── DINNER HISTORY ── */
        .history-section {
            border-top: 1px solid #F0D5D5;
            padding: 14px 20px;
        }

        .history-toggle {
            background: none;
            border: none;
            color: #9E5D67;
            font-size: 13px;
            cursor: pointer;
            font-family: Georgia, serif;
            padding: 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .history-toggle:hover { color: #7D4E57; }

        .history-grid { display: none; margin-top: 12px; }
        .history-grid.open { display: block; }

        .history-week { margin-bottom: 10px; }

        .history-week-label {
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #C9847A;
            margin-bottom: 4px;
        }

        .history-dinners { display: flex; flex-wrap: wrap; gap: 6px; }

        .history-pill {
            background: #F4E0E0;
            color: #7D4E57;
            font-size: 11px;
            border-radius: 20px;
            padding: 3px 10px;
        }

        /* ── RECIPE PICKER MODAL ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(74,47,53,0.45);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }

        .modal {
            background: #fff;
            border-radius: 16px;
            width: 520px;
            max-width: 95vw;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 40px rgba(74,47,53,0.25);
            overflow: hidden;
        }

        .modal-header {
            background: linear-gradient(135deg, #E8B4B8 0%, #C9847A 100%);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-header h3 {
            color: #fff;
            font-size: 18px;
            font-weight: normal;
            letter-spacing: 0.05em;
            flex: 1;
        }

        .modal-header .slot-info { color: rgba(255,255,255,0.8); font-size: 12px; }

        .modal-close {
            background: rgba(255,255,255,0.25);
            border: none;
            color: #fff;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-close:hover { background: rgba(255,255,255,0.4); }

        .modal-search { padding: 12px 16px; border-bottom: 1px solid #F0D5D5; }

        .modal-search input {
            width: 100%;
            padding: 8px 14px;
            border: 2px solid #E8B4B8;
            border-radius: 30px;
            font-size: 14px;
            font-family: Georgia, serif;
            color: #4A2F35;
            background: #FDF5F5;
            outline: none;
        }
        .modal-search input:focus { border-color: #C9847A; }

        .modal-cats {
            padding: 8px 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            border-bottom: 1px solid #F0D5D5;
        }

        .cat-pill {
            padding: 4px 12px;
            border: 1px solid #E8B4B8;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            background: none;
            color: #9E5D67;
            font-family: Georgia, serif;
        }
        .cat-pill.active, .cat-pill:hover {
            background: linear-gradient(135deg, #E8B4B8, #C9847A);
            color: #fff;
            border-color: transparent;
        }

        .modal-list { flex: 1; overflow-y: auto; padding: 8px 0; }

        .recipe-option {
            padding: 10px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #FDF5F5;
        }
        .recipe-option:hover { background: #FDF5F5; }

        .recipe-option-name { flex: 1; font-size: 14px; color: #4A2F35; }
        .recipe-option-cat { font-size: 11px; color: #C9A9A9; }

        .modal-clear { padding: 10px 20px; border-top: 1px solid #F0D5D5; }

        .modal-clear button {
            background: none;
            border: 1px solid #E8B4B8;
            color: #C9A9A9;
            border-radius: 20px;
            padding: 5px 16px;
            font-size: 12px;
            cursor: pointer;
            font-family: Georgia, serif;
        }
        .modal-clear button:hover { color: #9E5D67; border-color: #C9847A; }

        /* ── FOOTER ── */
        footer {
            text-align: center;
            padding: 20px;
            color: #C9A9A9;
            font-size: 13px;
            border-top: 1px solid #F0D5D5;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 1000px) { main { grid-template-columns: 1fr; } }
        @media (max-width: 700px) {
            header h1 { font-size: 28px; }
            .meal-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>

<header>
    <h1>Life Dashboard</h1>
    <div class="date" id="header-date"></div>
</header>

<main>

    <!-- TO DO LIST -->
    <div class="card">
        <div class="card-header">
            <h2>To Do</h2>
        </div>
        <div class="card-body">
            <div class="todo-input-row">
                <input type="text" id="todo-input" placeholder="Add a task…" />
                <button class="btn-rose" onclick="addTodo()">+</button>
            </div>
            <ul id="todo-list"></ul>
            <p class="empty-msg" id="todo-empty">No tasks yet.</p>
        </div>
    </div>

    <!-- MEAL PLANNER -->
    <div class="card">
        <div class="card-header">
            <h2>Meal Planner</h2>
            <span class="save-status hidden" id="save-status">Saved ✓</span>
            <a href="recipes/index.html" class="btn-ghost">Browse Recipes →</a>
            <button class="btn-ghost" onclick="archiveWeek()">Save Week</button>
        </div>
        <div class="week-nav">
            <button class="btn-nav" onclick="shiftWeek(-1)">&#8249;</button>
            <span id="week-label"></span>
            <button class="btn-nav" onclick="shiftWeek(1)">&#8250;</button>
        </div>
        <div class="meal-grid" id="meal-grid"></div>

        <div class="history-section">
            <button class="history-toggle" onclick="toggleHistory()">
                <span id="history-arrow">▶</span> Past 3 Weeks of Dinners
            </button>
            <div class="history-grid" id="history-grid"></div>
        </div>
    </div>

</main>

<footer>Powered by ☕ & 🦄</footer>

<!-- RECIPE PICKER MODAL -->
<div class="modal-overlay" id="modal">
    <div class="modal">
        <div class="modal-header">
            <h3>Choose a Recipe</h3>
            <span class="slot-info" id="modal-slot-info"></span>
            <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-search">
            <input type="search" id="modal-search" placeholder="Search recipes…" oninput="filterRecipes()" autocomplete="off" />
        </div>
        <div class="modal-cats" id="modal-cats"></div>
        <div class="modal-list" id="modal-list"></div>
        <div class="modal-clear">
            <button onclick="selectRecipe(null)">Clear this slot</button>
        </div>
    </div>
</div>

<script>
// ── CONSTANTS ──
const DAYS_SHORT = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const DAYS_LONG  = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MONTHS     = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const MEALS      = ["Breakfast","Lunch","Dinner"];

// ── DATE HEADER ──
const today = new Date();
today.setHours(0,0,0,0);
document.getElementById("header-date").textContent =
    DAYS_LONG[today.getDay()] + ", " + MONTHS[today.getMonth()] + " " +
    today.getDate() + ", " + today.getFullYear();

// ── DATE UTILS ──
function dateKey(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function getMonday(d) {
    const date = new Date(d);
    const day  = date.getDay();
    date.setDate(date.getDate() + (day === 0 ? -6 : 1 - day));
    date.setHours(0,0,0,0);
    return date;
}

function addDays(d, n) {
    const date = new Date(d);
    date.setDate(date.getDate() + n);
    return date;
}

function formatWeekRange(monday) {
    const sunday = addDays(monday, 6);
    const sameMonth = monday.getMonth() === sunday.getMonth();
    return MONTHS[monday.getMonth()] + " " + monday.getDate() + "–" +
           (sameMonth ? "" : MONTHS[sunday.getMonth()] + " ") +
           sunday.getDate() + ", " + monday.getFullYear();
}

// ── WEEK STATE ──
let currentWeekStart = getMonday(today);
let currentPlan      = {};   // in-memory cache for current week
let dinnerHistory    = [];   // in-memory cache for history

// ── STORAGE LAYER ──
// Always saves to localStorage immediately (guaranteed persistence).
// Also syncs to the server/file when available (bonus file backup).

async function load(lsKey, apiPath, fallback) {
    const local = localStorage.getItem(lsKey);
    if (local) {
        // Have local data — return it, then try to sync from server in background
        try {
            const res = await fetch(apiPath);
            if (res.ok) {
                const server = await res.json();
                const isEmpty = Array.isArray(server) ? server.length === 0 : Object.keys(server).length === 0;
                if (!isEmpty) {
                    localStorage.setItem(lsKey, JSON.stringify(server));
                    return server;
                }
            }
        } catch {}
        return JSON.parse(local);
    }
    // No local data — try server, otherwise use fallback
    try {
        const res = await fetch(apiPath);
        if (res.ok) {
            const data = await res.json();
            localStorage.setItem(lsKey, JSON.stringify(data));
            return data;
        }
    } catch {}
    return fallback;
}

async function save(lsKey, apiPath, data) {
    // Save to localStorage first — always works
    localStorage.setItem(lsKey, JSON.stringify(data));
    // Then try to sync to file via server
    try {
        await fetch(apiPath, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });
    } catch {}
    flashSaved();
}

// ── PLAN HELPERS ──
function planLsKey(weekStart)  { return `life-plan-${dateKey(weekStart)}`; }
function planApiPath(weekStart) { return `/api/plan/${dateKey(weekStart)}`; }

async function fetchPlan(weekStart) {
    return load(planLsKey(weekStart), planApiPath(weekStart), {});
}

async function postPlan(weekStart, plan) {
    await save(planLsKey(weekStart), planApiPath(weekStart), plan);
}

async function fetchHistory() {
    return load("life-dinner-history", "/api/history", []);
}

async function postHistory(history) {
    await save("life-dinner-history", "/api/history", history);
}

// ── SAVE INDICATOR ──
let saveTimer;
function flashSaved() {
    const el = document.getElementById("save-status");
    el.classList.remove("hidden");
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => el.classList.add("hidden"), 2000);
}

// ── SLOT ACCESS ──
function getSlot(dk, meal) {
    return (currentPlan[dk] && currentPlan[dk][meal]) || null;
}

async function setSlot(dk, meal, recipe) {
    if (!currentPlan[dk]) currentPlan[dk] = {};
    currentPlan[dk][meal] = recipe; // {id, title} or null
    await postPlan(currentWeekStart, currentPlan);
}

// ── DINNER HISTORY ──
function isRecentDinner(recipeId) {
    const cutoff = new Date(today);
    cutoff.setDate(cutoff.getDate() - 21);
    return dinnerHistory.some(h => h.recipeId === recipeId && new Date(h.date) >= cutoff);
}

async function archiveWeek() {
    const weekKey = dateKey(currentWeekStart);

    // Rebuild dinner history for this week (for 3-week rotation tracking)
    const filtered = dinnerHistory.filter(h => h.weekKey !== weekKey);
    let mealCount = 0;

    for (let i = 0; i < 7; i++) {
        const dk = dateKey(addDays(currentWeekStart, i));
        MEALS.forEach(meal => {
            const recipe = getSlot(dk, meal);
            if (recipe) {
                mealCount++;
                if (meal === "Dinner") {
                    filtered.push({ date: dk, weekKey, recipeId: recipe.id, recipeName: recipe.title });
                }
            }
        });
    }

    dinnerHistory = filtered;

    // Save full plan (all meals) + dinner history in parallel
    await Promise.all([
        postPlan(currentWeekStart, currentPlan),
        postHistory(dinnerHistory)
    ]);

    renderHistory();
    alert(mealCount > 0
        ? `✓ Week saved — ${mealCount} meal${mealCount !== 1 ? "s" : ""} archived.`
        : "No meals were planned for this week.");
}

// ── WEEK NAVIGATION ──
async function shiftWeek(delta) {
    currentWeekStart = addDays(currentWeekStart, delta * 7);
    currentPlan      = await fetchPlan(currentWeekStart);
    renderMealPlanner();
}

// ── RECIPES CACHE ──
let allRecipes    = [];
let modalSlotInfo = null;   // { dk, meal }
let modalActiveCat = "All";

async function loadRecipes() {
    if (allRecipes.length > 0) return;
    try {
        const res  = await fetch("recipes/recipes.json");
        allRecipes = await res.json();
        allRecipes.sort((a,b) => a.title.localeCompare(b.title));
    } catch(e) { console.error("Could not load recipes:", e); }
}

// ── MEAL PLANNER RENDER ──
function renderMealPlanner() {
    document.getElementById("week-label").textContent = "Week of " + formatWeekRange(currentWeekStart);

    const grid = document.getElementById("meal-grid");
    grid.innerHTML = "";

    for (let i = 0; i < 7; i++) {
        const date    = addDays(currentWeekStart, i);
        const dk      = dateKey(date);
        const isToday = dk === dateKey(today);

        const col = document.createElement("div");
        col.className = "meal-day" + (isToday ? " today" : "");

        col.innerHTML = `
            <div class="meal-day-header">
                <div class="meal-day-name">${isToday ? "Today" : DAYS_SHORT[date.getDay()]}</div>
                <div class="meal-day-date">${(date.getMonth()+1)}/${date.getDate()}</div>
            </div>
        `;

        MEALS.forEach(meal => {
            const recipe = getSlot(dk, meal);
            const slot   = document.createElement("div");
            slot.className = "meal-slot";

            const lbl = document.createElement("div");
            lbl.className    = "meal-slot-label";
            lbl.textContent  = meal[0]; // B / L / D

            const content = document.createElement("div");
            content.className = "meal-slot-content";

            if (recipe) {
                const link = document.createElement("a");
                link.className = "meal-recipe-name";
                link.href      = `recipes/recipe.html?id=${encodeURIComponent(recipe.id)}`;
                link.target    = "_blank";
                link.textContent = recipe.title;
                content.appendChild(link);

                const clr = document.createElement("button");
                clr.className   = "meal-slot-clear";
                clr.textContent = "×";
                clr.title       = "Remove";
                clr.addEventListener("click", async () => {
                    await setSlot(dk, meal, null);
                    renderMealPlanner();
                });
                content.appendChild(clr);
            } else {
                const add = document.createElement("button");
                add.className   = "meal-slot-add";
                add.textContent = "+ add";
                add.addEventListener("click", () => openModal(dk, meal));
                content.appendChild(add);
            }

            slot.appendChild(lbl);
            slot.appendChild(content);

            if (meal === "Dinner" && recipe && isRecentDinner(recipe.id)) {
                const warn = document.createElement("span");
                warn.className   = "warn-badge";
                warn.textContent = "⚠ recent";
                slot.appendChild(warn);
            }

            col.appendChild(slot);
        });

        grid.appendChild(col);
    }

    renderHistory();
}

// ── HISTORY PANEL ──
function renderHistory() {
    const container = document.getElementById("history-grid");

    if (dinnerHistory.length === 0) {
        container.innerHTML = '<p class="empty-msg" style="margin-top:8px">No archived dinners yet.</p>';
        return;
    }

    const weeks = {};
    dinnerHistory.forEach(h => {
        const wk = h.weekKey || h.date.slice(0,7);
        if (!weeks[wk]) weeks[wk] = [];
        weeks[wk].push(h);
    });

    const sortedWeeks = Object.keys(weeks).sort().reverse().slice(0, 3);
    container.innerHTML = "";

    sortedWeeks.forEach(wk => {
        const entries = weeks[wk];
        const minDate = entries.reduce((a,b) => a.date < b.date ? a : b).date;
        const maxDate = entries.reduce((a,b) => a.date > b.date ? a : b).date;

        const weekDiv = document.createElement("div");
        weekDiv.className = "history-week";
        weekDiv.innerHTML = `<div class="history-week-label">Week of ${minDate} – ${maxDate}</div>`;

        const pills = document.createElement("div");
        pills.className = "history-dinners";
        entries.forEach(e => {
            const pill = document.createElement("span");
            pill.className   = "history-pill";
            pill.textContent = e.recipeName;
            pills.appendChild(pill);
        });

        weekDiv.appendChild(pills);
        container.appendChild(weekDiv);
    });
}

function toggleHistory() {
    const grid  = document.getElementById("history-grid");
    const arrow = document.getElementById("history-arrow");
    const open  = grid.classList.toggle("open");
    arrow.textContent = open ? "▼" : "▶";
}

// ── MODAL ──
async function openModal(dk, meal) {
    modalSlotInfo  = { dk, meal };
    modalActiveCat = "All";

    const date = new Date(dk + "T00:00:00");
    document.getElementById("modal-slot-info").textContent =
        DAYS_LONG[date.getDay()] + " · " + meal;
    document.getElementById("modal-search").value = "";

    await loadRecipes();
    buildCatPills();
    filterRecipes();
    document.getElementById("modal").classList.add("open");
    document.getElementById("modal-search").focus();
}

function closeModal() {
    document.getElementById("modal").classList.remove("open");
    modalSlotInfo = null;
}

document.getElementById("modal").addEventListener("click", e => {
    if (e.target === document.getElementById("modal")) closeModal();
});
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

function buildCatPills() {
    const cats = ["All", ...[...new Set(allRecipes.map(r => r.category || "Other"))].sort()];
    const container = document.getElementById("modal-cats");
    container.innerHTML = "";
    cats.forEach(cat => {
        const btn = document.createElement("button");
        btn.className   = "cat-pill" + (cat === modalActiveCat ? " active" : "");
        btn.textContent = cat;
        btn.addEventListener("click", () => {
            modalActiveCat = cat;
            document.querySelectorAll(".cat-pill").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            filterRecipes();
        });
        container.appendChild(btn);
    });
}

function filterRecipes() {
    const query    = document.getElementById("modal-search").value.trim().toLowerCase();
    const isDinner = modalSlotInfo && modalSlotInfo.meal === "Dinner";

    let pool = allRecipes;
    if (modalActiveCat !== "All") pool = pool.filter(r => (r.category||"Other") === modalActiveCat);
    if (query) pool = pool.filter(r => r.title.toLowerCase().includes(query) || (r.category||"").toLowerCase().includes(query));

    const list = document.getElementById("modal-list");
    list.innerHTML = "";

    if (pool.length === 0) {
        list.innerHTML = '<p class="empty-msg">No recipes found.</p>';
        return;
    }

    pool.forEach(recipe => {
        const div  = document.createElement("div");
        div.className = "recipe-option";
        div.addEventListener("click", () => selectRecipe(recipe));

        const name = document.createElement("span");
        name.className   = "recipe-option-name";
        name.textContent = recipe.title;

        const cat = document.createElement("span");
        cat.className   = "recipe-option-cat";
        cat.textContent = recipe.category || "";

        div.appendChild(name);
        div.appendChild(cat);

        if (isDinner && isRecentDinner(recipe.id)) {
            const warn = document.createElement("span");
            warn.className   = "warn-badge";
            warn.textContent = "⚠ used recently";
            div.appendChild(warn);
        }

        list.appendChild(div);
    });
}

async function selectRecipe(recipe) {
    if (!modalSlotInfo) return;
    const { dk, meal } = modalSlotInfo;
    await setSlot(dk, meal, recipe ? { id: recipe.id, title: recipe.title } : null);
    renderMealPlanner();
    closeModal();
}

// ── TO DO ──
const todoInput = document.getElementById("todo-input");
const todoList  = document.getElementById("todo-list");
const todoEmpty = document.getElementById("todo-empty");

async function saveTodos() {
    const items = [];
    todoList.querySelectorAll("li").forEach(li => {
        items.push({ text: li.dataset.text, done: li.classList.contains("done") });
    });
    await save("life-todos", "/api/todos", items);
}

function renderTodo(text, done = false) {
    const li = document.createElement("li");
    li.dataset.text = text;
    if (done) li.classList.add("done");

    const uid = "td-" + Date.now() + Math.random();
    const cb  = document.createElement("input");
    cb.type    = "checkbox";
    cb.id      = uid;
    cb.checked = done;
    cb.addEventListener("change", () => { li.classList.toggle("done", cb.checked); saveTodos(); });

    const lbl = document.createElement("label");
    lbl.htmlFor     = uid;
    lbl.textContent = text;

    const del = document.createElement("button");
    del.className   = "btn-delete";
    del.textContent = "×";
    del.addEventListener("click", () => {
        li.remove();
        todoEmpty.style.display = todoList.children.length === 0 ? "block" : "none";
        saveTodos();
    });

    li.appendChild(cb);
    li.appendChild(lbl);
    li.appendChild(del);
    todoList.appendChild(li);
    todoEmpty.style.display = "none";
}

function addTodo() {
    const text = todoInput.value.trim();
    if (!text) return;
    renderTodo(text);
    saveTodos();
    todoInput.value = "";
}

todoInput.addEventListener("keydown", e => { if (e.key === "Enter") addTodo(); });

// ── INIT ──
(async function init() {
    const [plan, history, todos] = await Promise.all([
        fetchPlan(currentWeekStart),
        fetchHistory(),
        load("life-todos", "/api/todos", [])
    ]);
    currentPlan   = plan;
    dinnerHistory = history;
    todos.forEach(item => renderTodo(item.text, item.done));
    todoEmpty.style.display = todos.length === 0 ? "block" : "none";
    renderMealPlanner();
})();
</script>
