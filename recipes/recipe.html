<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header id="recipe-header" class="recipe-detail-header">
    <div id="recipe-title" class="header-banner">Loading...</div>
</header>

<main>

    <a href="index.html" class="back-link">← Back to Recipes</a>

    <div class="ingredients">
        <h2 class="section-heading">Ingredients</h2>
        <div id="ingredients-list"></div>
    </div>

    <div class="preparation">
        <h2 class="section-heading">Instructions</h2>
        <div id="instructions-list"></div>
    </div>

    <div class="notes">
        <h2 class="section-heading">Notes</h2>
        <div id="notes" class="notes-body"></div>
    </div>

    <div class="nutrition">
        <h2 class="section-heading">Nutrition</h2>
        <div id="nutrition" class="nutrition-body"></div>
    </div>

    <button class="reset-button" onclick="resetCheckboxes()">
        ✓ Reset All Checkboxes
    </button>

</main>

<footer>
    Powered by ☕ & 🌮
</footer>

<script>
function resetCheckboxes() {
    document
        .querySelectorAll('input[type="checkbox"]')
        .forEach(cb => cb.checked = false);
}

function showError(message) {
    document.body.innerHTML = `
        <main class="error-message">
            <h1>${message}</h1>
            <p><a href="index.html">Return to recipe list</a></p>
        </main>
    `;
}

function addCheckItem(container, idPrefix, text) {
    const index = container.children.length;

    const div = document.createElement("div");
    div.className = "check-item";

    div.innerHTML = `
        <input type="checkbox" id="${idPrefix}${index}">
        <label for="${idPrefix}${index}">${text}</label>
    `;

    container.appendChild(div);
}

function addInstructionItem(container, text) {
    const index = container.children.length;

    const div = document.createElement("div");
    div.className = "check-item";

    div.innerHTML = `
        <input type="checkbox" id="step${index}">
        <span class="step-num">${index + 1}</span>
        <label for="step${index}">${text}</label>
    `;

    container.appendChild(div);
}

function renderNutrition(nutrition) {
    const container = document.createElement("div");
    container.className = "nutrition-label";

    const panel = document.createElement("div");
    panel.className = "nutrition-panel";
    container.appendChild(panel);

    if (!nutrition) {
        panel.textContent = "Nutrition information not available.";
        return container;
    }

    if (typeof nutrition === "string") {
        panel.classList.add("nutrition-text");
        panel.textContent = nutrition;
        return container;
    }

    const dv = {
        totalFat: 78,
        saturatedFat: 20,
        cholesterol: 300,
        sodium: 2300,
        totalCarbs: 275,
        fiber: 28,
        protein: 50,
        calcium: 1300,
        iron: 18,
        potassium: 4700,
    };

    const parseAmount = value => {
        if (!value) return null;
        const match = String(value).match(/([0-9]+(?:\.[0-9]+)?)/);
        return match ? parseFloat(match[1]) : null;
    };

    const getPercent = (key, value) => {
        const amount = parseAmount(value);
        const standard = dv[key];
        if (amount == null || standard == null) return "";
        const percent = Math.round((amount / standard) * 100);
        return `${percent}%`;
    };

    const createRow = (label, value, key, bold = false) => {
        const row = document.createElement("div");
        row.className = `nutrition-row${bold ? " nutrition-row-bold" : ""}`;

        const labelEl = document.createElement("span");
        labelEl.textContent = label;
        row.appendChild(labelEl);

        const valueArea = document.createElement("span");
        valueArea.className = "nutrition-row-value";
        const amountEl = document.createElement("span");
        amountEl.textContent = value;
        amountEl.className = "nutrition-value";
        valueArea.appendChild(amountEl);

        const dvEl = document.createElement("span");
        dvEl.textContent = getPercent(key, value);
        dvEl.className = "nutrition-dv";
        valueArea.appendChild(dvEl);

        row.appendChild(valueArea);
        return row;
    };

    const top = document.createElement("div");
    top.className = "nutrition-top";
    const title = document.createElement("div");
    title.className = "nutrition-title";
    title.textContent = "Nutrition Facts";
    const servings = document.createElement("div");
    servings.className = "nutrition-servings";
    servings.textContent = nutrition.servings ? `Servings ${nutrition.servings}` : "";
    top.appendChild(title);
    top.appendChild(servings);
    panel.appendChild(top);

    if (nutrition.calories !== undefined) {
        const caloriesRow = document.createElement("div");
        caloriesRow.className = "nutrition-calories";
        caloriesRow.innerHTML = `
            <span>Calories</span>
            <strong>${nutrition.calories}</strong>
        `;
        panel.appendChild(caloriesRow);
    }

    if (nutrition.totalFat) panel.appendChild(createRow("Total Fat", nutrition.totalFat, "totalFat", true));
    if (nutrition.saturatedFat) panel.appendChild(createRow("Saturated Fat", nutrition.saturatedFat, "saturatedFat"));
    if (nutrition.transFat) panel.appendChild(createRow("Trans Fat", nutrition.transFat, null));
    if (nutrition.cholesterol) panel.appendChild(createRow("Cholesterol", nutrition.cholesterol, "cholesterol"));
    if (nutrition.sodium) panel.appendChild(createRow("Sodium", nutrition.sodium, "sodium"));
    if (nutrition.totalCarbs) panel.appendChild(createRow("Total Carbs", nutrition.totalCarbs, "totalCarbs", true));
    if (nutrition.fiber) panel.appendChild(createRow("Fiber", nutrition.fiber, "fiber"));
    if (nutrition.sugars) panel.appendChild(createRow("Sugars", nutrition.sugars, null));
    if (nutrition.protein) panel.appendChild(createRow("Protein", nutrition.protein, "protein", true));
    if (nutrition.calcium) panel.appendChild(createRow("Calcium", nutrition.calcium, "calcium"));
    if (nutrition.iron) panel.appendChild(createRow("Iron", nutrition.iron, "iron"));
    if (nutrition.potassium) panel.appendChild(createRow("Potassium", nutrition.potassium, "potassium"));

    const disclaimer = document.createElement("div");
    disclaimer.className = "nutrition-disclaimer";
    disclaimer.textContent = "* The % Daily Value (DV) tells you how much a nutrient in a serving of food contributes to a daily diet. 2,000 calories a day is used for general nutrition advice.";
    panel.appendChild(disclaimer);

    return container;
}

async function loadRecipe() {
    const params = new URLSearchParams(window.location.search);
    const recipeId = params.get("id");

    if (!recipeId) {
        showError("Recipe not found");
        return;
    }

    const response = await fetch("recipes.json");

    if (!response.ok) {
        throw new Error("Could not load recipes.json");
    }

    const recipes = await response.json();
    const recipe = recipes.find(r => r.id === recipeId);

    if (!recipe) {
        showError("Recipe not found");
        return;
    }

    document.title = recipe.title;

    document.getElementById("recipe-title").textContent = recipe.title;

    if (recipe.image) {
        document.getElementById("recipe-header").style.backgroundImage =
            `url('${recipe.image}')`;
    }

    const ingredientsList = document.getElementById("ingredients-list");
    const instructionsList = document.getElementById("instructions-list");

    (recipe.ingredients || []).forEach(item => {
        addCheckItem(ingredientsList, "ing", item);
    });

    (recipe.instructions || []).forEach(item => {
        addInstructionItem(instructionsList, item);
    });

    document.getElementById("notes").textContent =
        recipe.notes || "No notes available.";

    const nutritionContainer = document.getElementById("nutrition");
    nutritionContainer.innerHTML = "";
    nutritionContainer.appendChild(renderNutrition(recipe.nutrition));
}

loadRecipe().catch(error => {
    console.error(error);
    showError("Error loading recipe");
});
</script>

</body>
</html>
